<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Stats preview card component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="img-container">
                <img class="hero-img" src="image-header-mobile.jpg" alt="" width="">
            </div>
            <article class="article">
        <h1>Get <span style="color: #a855f7; font-weight: bold;">insights</span> that help your business grow.</h1>

        <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer 
  experience, and overall efficiency.</p>
        <div class="stat-container">
        <div class="stats"><span>10k+</span> <p>COMPANIES</p></div>
        <div class="stats"><span>314</span> <p>TEMPLATES</p></div>
        <div class="stats"><span>12m+</span> <p>QUERIES</p></div>
        </div>
         </article>
   </section>
  <footer class="attribution">
    <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Abdulazeez Mueez Eniola</a>.
    </p>
  </footer>
  </main>
</body>
</html>
